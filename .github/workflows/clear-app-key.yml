name: Sanitize APP_KEY

on:
  push:
    branches: [main, master]
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clear APP_KEY in environment files
        run: |
          # Find all .env files (like .env.example) and clear the APP_KEY value
          find . -maxdepth 2 -name ".env*" -exec sed -i 's/^APP_KEY=.*/APP_KEY=/' {} +
          echo "Sanitization check completed."

      - name: Commit and Push Sanitized Files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for changes
          if ! git diff --exit-code; then
            echo "Sensitive APP_KEY found. Sanitizing and committing back..."
            git config --global user.name "soymadip"
            git config --global user.email "84225810+soymadip@users.noreply.github.com"
            git add .
            git commit -m "chore: sanitize APP_KEY in environment files [skip ci]"
            git push
          else
            echo "✅ No sensitive APP_KEY found in tracked environment files."
          fi
