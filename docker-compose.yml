name: csmp
services:
  # PHP Application (Laravel)
  backend:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www
    environment:
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:-database}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-csmp}
      - DB_USERNAME=${DB_USERNAME:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin}
    depends_on:
      - database
    networks:
      - csmp-network
    env_file:
      - ./laravel/.env

  # Web Server (Nginx)
  server:
    image: nginx:stable-alpine
    container_name: server 
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www
      - ./laravel/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - csmp-network

  # Database (MariaDB)
  database:
    image: mariadb:10.11
    container_name: database
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-csmp}
      MARIADB_USER: ${DB_USERNAME:-admin}
      MARIADB_PASSWORD: ${DB_PASSWORD:-admin}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
    ports:
      - "3306:3306"
    volumes:
      - csmp-db-data:/var/lib/mysql
    networks:
      - csmp-network
    env_file:
      - ./laravel/.env

networks:
  csmp-network:
    driver: bridge

volumes:
  csmp-db-data:
    driver: local
