name: csmp
services:
  # Database (MariaDB)
  database:
    image: mariadb:10.11
    container_name: database
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - csmp-db-data:/var/lib/mysql
    networks:
      - csmp-network
    env_file:
      - ./.env

  # PHP Application (Laravel)
  backend:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./.env:/var/www/.env

    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - database
    networks:
      - csmp-network
    env_file:
      - ./.env

    develop:
      watch:
        - action: rebuild
          path: ./laravel/Dockerfile
        - action: rebuild
          path: ./laravel/composer.json
        - action: sync
          path: ./laravel
          target: /var/www
          ignore:
            - ./laravel/vendor/
            - ./laravel/node_modules/

  # Web Server (Nginx)
  server:
    image: nginx:stable-alpine
    container_name: server
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www:ro
      - ./laravel/nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend
    networks:
      - csmp-network

  # Database Management (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=database
      - PMA_USER=${DB_USERNAME}
      - PMA_PASSWORD=${DB_PASSWORD}
      - PMA_ARBITRARY=1
    networks:
      - csmp-network
    depends_on:
      - database

networks:
  csmp-network:
    driver: bridge

volumes:
  csmp-db-data:
    driver: local
