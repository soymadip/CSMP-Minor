<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../img/logo.png" />
    <title>CSMP | Portal Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/app.css" />
    <style>
      body {
        font-family: "Outfit", sans-serif;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out forwards;
      }

      .glass-card {
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      }

      .solid-card {
        background: var(--base-100);
      }

      .tab-active {
        @apply bg-primary text-white shadow-lg shadow-primary/20;
      }

      .form-section {
        display: none;
      }

      .form-section.active {
        display: block;
        animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .icon-mask {
        mask-repeat: no-repeat;
        mask-position: center;
        mask-size: contain;
        background-color: currentColor;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-cover bg-center bg-no-repeat pt-16"
    style="
      background-image: url(&quot;../img/cts.png&quot;);
      background-size: 100% 200%;
    "
  >
    <!-- Navbar -->
    <div
      class="navbar bg-rose-50/70 dark:bg-rose-950/40 backdrop-blur-3xl shadow-lg border-b border-rose-200 dark:border-red-500/10 fixed top-0 left-0 right-0 z-50"
    >
      <!-- Logo -->
      <div class="navbar-start">
        <a href="home.html" class="text-xl font-bold flex items-center gap-1">
          <img src="../img/logo.png" alt="CSMP Logo" class="w-12 h-12" />
          CSMP
        </a>
      </div>

      <div class="navbar-end gap-3 text-lg">
        <!-- Theme Toggle -->
        <label class="swap swap-rotate btn btn-ghost btn-circle">
          <input type="checkbox" class="theme-controller" value="dark" />
          <span
            class="swap-off icon-mask w-6 h-6"
            style="
              mask-image: url(&quot;../img/svg/sun.svg&quot;);
              -webkit-mask-image: url(&quot;../img/svg/sun.svg&quot;);
            "
          ></span>
          <span
            class="swap-on icon-mask w-6 h-6"
            style="
              mask-image: url(&quot;../img/svg/moon.svg&quot;);
              -webkit-mask-image: url(&quot;../img/svg/moon.svg&quot;);
            "
          ></span>
        </label>

        <a
          href="home.html"
          class="btn btn-ghost btn-sm border border-white/20 bg-white/5 backdrop-blur-md gap-2 text-white hover:bg-white/10 transition-all px-4 h-10 min-h-0"
        >
          <span
            class="icon-mask w-4 h-4"
            style="
              mask-image: url(&quot;../img/svg/home.svg&quot;);
              -webkit-mask-image: url(&quot;../img/svg/home.svg&quot;);
            "
          ></span>
          Home
        </a>
      </div>
    </div>

    <!-- Auth Section -->
    <div
      class="flex items-center justify-center min-h-[calc(100vh-64px)] px-4 py-12 bg-black/40 backdrop-blur-md"
    >
      <div class="w-full max-w-md animate-fade-in-up">
        <div
          class="card bg-base-100 shadow-2xl rounded-2xl overflow-hidden border border-white/5"
        >
          <div class="p-8">
            <div class="text-center mb-8">
              <h1
                id="auth-title"
                class="text-4xl font-bold text-primary mb-2 drop-shadow-lg"
              >
                Welcome Back
              </h1>
            </div>

            <!-- Tab Switcher -->
            <div
              class="grid grid-cols-2 p-1.5 bg-base-200 rounded-2xl mb-8 border border-white/5"
            >
              <button
                id="login-tab"
                onclick="switchTab('login')"
                class="py-3 rounded-xl text-sm font-bold tracking-wide transition-all duration-300 tab-active"
              >
                LOGIN
              </button>
              <button
                id="register-tab"
                onclick="switchTab('register')"
                class="py-3 rounded-xl text-sm font-bold tracking-wide transition-all duration-300 text-rose-100/40 hover:text-white"
              >
                REGISTER
              </button>
            </div>

            <!-- Login Form -->
            <div id="login-section" class="form-section active">
              <form action="#" class="space-y-6">
                <div class="form-control">
                  <label class="label px-2">
                    <span
                      class="label-text text-rose-100/70 font-bold text-xs uppercase tracking-widest"
                      >Email</span
                    >
                  </label>
                  <div class="relative group">
                    <div
                      class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-rose-300/40 group-focus-within:text-primary transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                        />
                      </svg>
                    </div>
                    <input
                      type="email"
                      placeholder="faculty@csmp.edu.in"
                      class="input input-bordered w-full pl-12 bg-white/5 border-white/10 text-white focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 rounded-2xl transition-all"
                      required
                    />
                  </div>
                </div>

                <div class="form-control">
                  <label class="label px-2">
                    <span
                      class="label-text text-rose-100/70 font-bold text-xs uppercase tracking-widest"
                      >Password</span
                    >
                    <a
                      href="#"
                      class="label-text-alt link link-primary no-underline hover:underline font-bold text-[10px] tracking-tighter"
                      >FORGOT?</a
                    >
                  </label>
                  <div class="relative group">
                    <div
                      class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-rose-300/40 group-focus-within:text-primary transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"
                        />
                      </svg>
                    </div>
                    <input
                      id="login-password"
                      type="password"
                      placeholder="••••••••••••"
                      class="input input-bordered w-full pl-12 pr-12 bg-white/5 border-white/10 text-white focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 rounded-2xl transition-all"
                      required
                    />
                    <button
                      type="button"
                      onclick="togglePassword('login-password', this)"
                      class="absolute inset-y-0 right-0 pr-4 flex items-center text-rose-300/40 hover:text-primary transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                        />
                      </svg>
                    </button>
                  </div>
                </div>

                <div class="flex items-center justify-between px-2">
                  <label class="label cursor-pointer gap-3 p-0">
                    <input
                      type="checkbox"
                      class="checkbox checkbox-primary checkbox-sm border-white/20"
                      checked
                    />
                    <span
                      class="label-text text-rose-100/50 text-xs font-semibold"
                      >Keep Logged In</span
                    >
                  </label>
                </div>

                <button
                  class="btn btn-primary w-full h-14 text-lg font-bold rounded-2xl shadow-xl shadow-primary/20 border-0"
                >
                  LOGIN
                </button>
              </form>
            </div>

            <!-- Register Form -->
            <div id="register-section" class="form-section">
              <form action="#" class="space-y-4">
                <div class="form-control">
                  <label class="label px-2"
                    ><span
                      class="label-text text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Full Name</span
                    ></label
                  >
                  <input
                    type="text"
                    placeholder="John Doe"
                    class="input input-bordered w-full bg-white/5 border-white/10 text-white focus:border-primary h-12 rounded-xl transition-all"
                    required
                  />
                </div>

                <div class="form-control">
                  <label class="label px-2"
                    ><span
                      class="label-text text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Official Email</span
                    ></label
                  >
                  <input
                    type="email"
                    placeholder="name@institute.edu"
                    class="input input-bordered w-full bg-white/5 border-white/10 text-white focus:border-primary h-12 rounded-xl transition-all"
                    required
                  />
                </div>

                <div class="form-control">
                  <label class="label px-2"
                    ><span
                      class="label-text text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Department</span
                    ></label
                  >
                  <select
                    class="select select-bordered w-full bg-white/5 border-white/10 text-white focus:border-primary h-12 min-h-0 rounded-xl transition-all"
                  >
                    <option disabled selected>Select Department</option>
                    <option>Computer Science & Technology</option>
                    <option>Electrical Engineering</option>
                    <option>Civil Engineering</option>
                    <option>Mechanical Engineering</option>
                  </select>
                </div>

                <div class="form-control">
                  <label class="label px-2"
                    ><span
                      class="label-text text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Password</span
                    ></label
                  >
                  <div class="relative group">
                    <input
                      id="register-password"
                      type="password"
                      placeholder="••••••••"
                      class="input input-bordered w-full bg-white/5 border-white/10 text-white focus:border-primary h-12 rounded-xl transition-all pr-12"
                      required
                    />
                    <button
                      type="button"
                      onclick="togglePassword('register-password', this)"
                      class="absolute inset-y-0 right-0 pr-4 flex items-center text-rose-300/40 hover:text-primary transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                        />
                      </svg>
                    </button>
                  </div>
                </div>

                <div class="pt-4">
                  <button
                    class="btn btn-secondary w-full h-14 font-bold rounded-2xl shadow-xl shadow-secondary/20 border-0"
                  >
                    CREATE ACCOUNT
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Theme Control & Script -->
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
