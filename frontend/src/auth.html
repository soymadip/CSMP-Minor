<!doctype html>

<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/logo.png" />
    <title>CTS Student Management Portal | Login</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body
    class="h-screen flex flex-col bg-cover bg-center bg-no-repeat overflow-hidden font-['Outfit',sans-serif] text-slate-800 in-[.dark]:text-white bg-white in-[.dark]:bg-slate-900 transition-colors duration-300"
    style="
      background-image: url(&quot;img/cts.png&quot;);
      background-size: 100% 200%;
    "
  >
    <!-- Deprecation Warning -->
    <div class="fixed top-20 left-1/2 -translate-x-1/2 z-60 w-full max-w-xl px-4 pointer-events-none">
      <div class="bg-amber-500/10 border border-amber-500/50 backdrop-blur-xl rounded-2xl p-3 text-center">
        <span class="text-amber-500 font-bold uppercase tracking-widest text-[10px]">⚠️ This page is deprecated and will be removed in future versions.</span>
      </div>
    </div>

    <!-- Navbar -->
    <nav
      class="flex items-center justify-between px-4 h-16 bg-white/70 in-[.dark]:bg-slate-800/60 text-slate-800 in-[.dark]:text-white backdrop-blur-3xl shadow-lg border-b border-rose-200 in-[.dark]:border-rose-500/10 z-50 transition-colors duration-300 shrink-0"
    >
      <div class="flex items-center">
        <a href="index.html" class="text-xl font-bold flex items-center gap-1">
          <img src="img/logo.png" alt="Logo" class="w-12 h-12" />
          CSMP
        </a>
      </div>

      <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="p-2 hover:bg-white/10 rounded-full transition-colors relative h-10 w-10 overflow-hidden">
          <input type="checkbox" class="theme-controller opacity-0 absolute inset-0 cursor-pointer z-10" value="dark" />
          <span
            class="inline-block mask-no-repeat mask-center mask-contain bg-current w-6 h-6 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-transform duration-300 in-[.dark]:scale-0"
            style="
              mask-image: url(&quot;img/svg/sun.svg&quot;);
              -webkit-mask-image: url(&quot;img/svg/sun.svg&quot;);
            "
          ></span>
          <span
            class="inline-block mask-no-repeat mask-center mask-contain bg-current w-6 h-6 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-transform duration-300 scale-0 in-[.dark]:scale-100"
            style="
              mask-image: url(&quot;img/svg/moon.svg&quot;);
              -webkit-mask-image: url(&quot;img/svg/moon.svg&quot;);
            "
          ></span>
        </button>

        <a
          href="index.html"
          class="flex items-center gap-2 px-4 h-10 bg-slate-50/80 in-[.dark]:bg-white/5 border border-slate-100/60 in-[.dark]:border-white/20 backdrop-blur-md rounded-2xl hover:bg-slate-50/80 in-[.dark]:bg-white/5/20 transition-all shadow-sm"
        >
          <span
            class="inline-block mask-no-repeat mask-center mask-contain bg-current w-4 h-4"
            style="
              mask-image: url(&quot;img/svg/home.svg&quot;);
              -webkit-mask-image: url(&quot;img/svg/home.svg&quot;);
            "
          ></span>
          Home
        </a>
      </div>
    </nav>

    <!-- Auth Section -->
    <div
      class="flex-1 flex items-center justify-center px-4 py-8 bg-black/40 backdrop-blur-md overflow-y-auto"
    >
      <div class="w-full max-w-md transition-all duration-700 starting:opacity-0 starting:translate-y-5">
        <div
          class="bg-white in-[.dark]:bg-slate-900 shadow-2xl rounded-2xl overflow-hidden border border-white/5 p-8"
        >
            <div class="text-center mb-8">
              <h1
                id="auth-title"
                class="text-4xl font-bold text-rose-500 mb-2 drop-shadow-lg"
              >
                Welcome Back
              </h1>
            </div>

            <!-- Tab Switcher -->
            <div
              class="grid grid-cols-2 p-1.5 bg-slate-50 in-[.dark]:bg-slate-800 rounded-2xl mb-8 border border-white/5"
            >
              <button
                id="login-tab"
                onclick="switchTab('login')"
                class="py-3 rounded-xl text-sm font-bold tracking-wide transition-all duration-300 bg-rose-500 text-white shadow-lg shadow-rose-500/20"
              >
                LOGIN
              </button>
              <button
                id="register-tab"
                onclick="switchTab('register')"
                class="py-3 rounded-xl text-sm font-bold tracking-wide transition-all duration-300 text-rose-100/40 hover:text-white"
              >
                REGISTER
              </button>
            </div>

            <!-- Login Form -->
            <div id="login-section" class="hidden [&.active]:block [&.active]:transition-all duration-500 starting:opacity-0 starting:translate-y-2 active">
              <form action="#" class="space-y-6">
                <div>
                  <label class="block px-2 mb-2">
                    <span
                      class="text-rose-100/70 font-bold text-xs uppercase tracking-widest"
                      >Email</span
                    >
                  </label>
                  <div class="relative group">
                    <div
                      class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-rose-300/40 group-focus-within:text-rose-500 transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                        />
                      </svg>
                    </div>
                    <input
                      type="email"
                      placeholder="faculty@csmp.edu.in"
                      class="w-full pl-12 bg-white/5 border border-white/10 text-white focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 h-14 rounded-2xl transition-all outline-none"
                      required
                    />
                  </div>
                </div>

                <div>
                  <div class="flex items-center justify-between px-2 mb-2">
                    <span
                      class="text-rose-100/70 font-bold text-xs uppercase tracking-widest"
                      >Password</span
                    >
                    <a
                      href="#"
                      class="text-rose-500 hover:underline font-bold text-[10px] tracking-tighter"
                      >FORGOT?</a
                    >
                  </div>
                  <div class="relative group">
                    <div
                      class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-rose-300/40 group-focus-within:text-rose-500 transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"
                        />
                      </svg>
                    </div>
                    <input
                      id="login-password"
                      type="password"
                      placeholder="••••••••••••"
                      class="w-full pl-12 pr-12 bg-white/5 border border-white/10 text-white focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 h-14 rounded-2xl transition-all outline-none"
                      required
                    />
                    <button
                      type="button"
                      onclick="togglePassword('login-password', this)"
                      class="absolute inset-y-0 right-0 pr-4 flex items-center text-rose-300/40 hover:text-rose-500 transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                        />
                      </svg>
                    </button>
                  </div>
                </div>

                <div class="flex items-center justify-between px-2">
                  <label class="flex items-center gap-3 cursor-pointer">
                    <input
                      type="checkbox"
                      class="w-4 h-4 rounded border-white/20 bg-white/5 text-rose-500 focus:ring-rose-500"
                      checked
                    />
                    <span
                      class="text-rose-100/50 text-xs font-semibold"
                      >Keep Logged In</span
                    >
                  </label>
                </div>

                <button
                  class="w-full h-14 text-lg font-bold rounded-2xl shadow-xl shadow-rose-500/20 bg-rose-500 text-white hover:opacity-90 transition-all"
                >
                  LOGIN
                </button>
              </form>
            </div>

            <!-- Register Form -->
            <div id="register-section" class="hidden [&.active]:block [&.active]:transition-all duration-500 starting:opacity-0 starting:translate-y-2">
              <form action="#" class="space-y-4">
                <div>
                  <label class="block px-2 mb-1"
                    ><span
                      class="text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Full Name</span
                    ></label
                  >
                  <input
                    type="text"
                    placeholder="John Doe"
                    class="w-full bg-white/5 border border-white/10 text-white focus:border-rose-500 h-12 rounded-xl transition-all px-4 outline-none"
                    required
                  />
                </div>

                <div>
                  <label class="block px-2 mb-1"
                    ><span
                      class="text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Official Email</span
                    ></label
                  >
                  <input
                    type="email"
                    placeholder="name@institute.edu"
                    class="w-full bg-white/5 border border-white/10 text-white focus:border-rose-500 h-12 rounded-xl transition-all px-4 outline-none"
                    required
                  />
                </div>

                <div>
                  <label class="block px-2 mb-1"
                    ><span
                      class="text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Department</span
                    ></label
                  >
                  <select
                    class="w-full bg-white/5 border border-white/10 text-white focus:border-rose-500 h-12 rounded-xl transition-all px-4 outline-none appearance-none"
                  >
                    <option disabled selected>Select Department</option>
                    <option>Computer Science & Technology</option>
                    <option>Electrical Engineering</option>
                    <option>Civil Engineering</option>
                    <option>Mechanical Engineering</option>
                  </select>
                </div>

                <div>
                  <label class="block px-2 mb-1"
                    ><span
                      class="text-rose-100/70 font-bold text-[10px] uppercase tracking-widest"
                      >Password</span
                    ></label
                  >
                  <div class="relative group">
                    <input
                      id="register-password"
                      type="password"
                      placeholder="••••••••"
                      class="w-full bg-white/5 border border-white/10 text-white focus:border-rose-500 h-12 rounded-xl transition-all pr-12 px-4 outline-none"
                      required
                    />
                    <button
                      type="button"
                      onclick="togglePassword('register-password', this)"
                      class="absolute inset-y-0 right-0 pr-4 flex items-center text-rose-300/40 hover:text-rose-500 transition-colors"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                        />
                      </svg>
                    </button>
                  </div>
                </div>

                <div class="pt-4">
                  <button
                    class="w-full h-14 font-bold rounded-2xl shadow-xl shadow-indigo-500/20 bg-indigo-500 text-white hover:opacity-90 transition-all"
                  >
                    CREATE ACCOUNT
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer
      class="flex items-center justify-center p-2 bg-rose-950 in-[.dark]:bg-rose-950/30 text-white border-t border-white/5 backdrop-blur-xl mt-auto shrink-0"
    >
      <div>
        <p class="text-xs">&copy; 2025 CSMP (The Calcutta Technical School).</p>
      </div>
    </footer>

    <!-- Theme Control & Script -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
